<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp - ArcVantage Portal</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-bridge-fill text-secondary-brand"></i>
                ARC<span>VANTAGE</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="bi bi-list fs-1 text-white"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home 1</a></li>
                    <li class="nav-item"><a class="nav-link" href="home2.html">Home 2</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3 ms-lg-3">
                    <div id="themeToggle" style="position: static;"><i class="bi bi-moon-fill"></i></div>
                </div>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper position-relative">
        <div class="hero-overlay hero-bg-main" style="opacity: 0.1;"></div>
        <div class="auth-card animate-fade-up position-relative z-1">
            <div class="text-center mb-4">
                <a href="index.html" class="navbar-brand fs-2 text-primary-brand justify-content-center">
                    <i class="bi bi-bridge-fill text-secondary-brand"></i>
                    ARC<span>VANTAGE</span>
                </a>
                <h2 class="mt-3">Client Registration</h2>
                <p class="text-muted small">Register for government project portal access</p>
            </div>

            <form action="login.html">
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label small fw-bold">First Name</label>
                        <input type="text" class="form-control" placeholder="John" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-bold">Last Name</label>
                        <input type="text" class="form-control" placeholder="Doe" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Department / Agency</label>
                    <input type="text" class="form-control" placeholder="State DOT / PWD" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Email Address</label>
                    <input type="email" class="form-control" placeholder="email@dept.gov" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Role</label>
                    <select class="form-select auth-card .form-control" style="background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 0.65rem 1rem;">
                        <option>Project Manager</option>
                        <option>Chief Engineer</option>
                        <option>Compliance Officer</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" class="form-control" placeholder="Create strong password" required>
                </div>
                
                <button type="submit" class="btn btn-brand-secondary w-100 py-2">Create Account</button>
            </form>

            <div class="auth-divider">Or register with</div>

            <div class="d-flex gap-3">
                <button class="social-login-btn">
                    <i class="bi bi-google text-danger"></i> Google
                </button>
                <button class="social-login-btn">
                    <i class="bi bi-linkedin text-primary"></i> LinkedIn
                </button>
            </div>

            <div class="text-center mt-4">
                <p class="small text-muted">Already have an account? <a href="login.html" class="text-primary-brand fw-bold text-decoration-none">Login Here</a></p>
            </div>
        </div>
    </div>



    <!-- Scripts -->
    <script src="assets/js/main.js"></script>
</body>
</html>
