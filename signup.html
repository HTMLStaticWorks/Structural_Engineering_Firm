<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp - ArcVantage Portal</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/favicon.png">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="auth-wrapper position-relative flex-column">
        <div class="hero-overlay hero-bg-main" style="opacity: 0.1;"></div>

        <!-- Theme & RTL Toggles (Top-Right) -->
        <div class="position-absolute top-0 end-0 m-4 d-flex gap-3 z-3">
            <div id="themeToggle" class="themeToggle toggle-shadow" title="Toggle Theme"><i class="bi bi-moon-fill fs-5"></i></div>
            <div id="rtlToggle" class="rtlToggle toggle-shadow" title="Toggle RTL"><i class="bi bi-arrow-left-right fs-5"></i></div>
        </div>



        <div class="auth-card animate-fade-up position-relative z-1">

            <div class="text-center mb-4">
                <a href="index.html" class="navbar-brand d-flex align-items-center justify-content-center m-0 mb-3"
                    dir="ltr">
                    <img src="assets/images/favicon.png" alt="ArcVantage" class="brand-logo-img me-2">
                    ARC<span>VANTAGE</span>
                </a>
                <h2 class="mt-2 text-primary-brand">Client Registration</h2>
            </div>

            <form action="login.html">
                <div class="mb-3">
                    <label class="form-label small fw-bold">First Name</label>
                    <input type="text" class="form-control" placeholder="John" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Last Name</label>
                    <input type="text" class="form-control" placeholder="Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Department / Agency</label>
                    <input type="text" class="form-control" placeholder="State DOT / PWD" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Email Address</label>
                    <input type="email" class="form-control" placeholder="email@dept.gov" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Role</label>
                    <select class="form-select">
                        <option>Project Manager</option>
                        <option>Chief Engineer</option>
                        <option>Compliance Officer</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" class="form-control" placeholder="Create strong password" required>
                </div>

                <button type="submit" class="btn btn-brand-secondary w-100 py-2 text-center">Create Account</button>
            </form>

            <div class="auth-divider text-white">Or register with</div>

            <div class="d-flex justify-content-center gap-3">
                <button class="social-login-btn" title="Google Signup">
                    <i class="bi bi-google text-danger"></i>
                </button>
                <button class="social-login-btn" title="Apple Signup">
                    <i class="bi bi-apple text-dark"></i>
                </button>
                <button class="social-login-btn" title="LinkedIn Signup">
                    <i class="bi bi-linkedin text-primary"></i>
                </button>
            </div>

            <div class="text-center mt-4">
                <p class="small text-white">Already have an account? <a href="login.html"
                        class="text-secondary-brand fw-bold text-decoration-none">Login Here</a></p>
            </div>
        </div>
    </div>



    <!-- Back to Top -->
    <a href="#" class="back-to-top" id="backToTop"><i class="bi bi-arrow-up"></i></a>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
