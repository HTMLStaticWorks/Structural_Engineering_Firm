<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp - ArcVantage Portal</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="auth-wrapper position-relative">
        <div class="hero-overlay hero-bg-main" style="opacity: 0.1;"></div>
        <div class="auth-card animate-fade-up position-relative z-1">
            <div id="themeToggle" class="position-absolute top-0 end-0 m-3 cursor-pointer fs-5 text-muted"><i class="bi bi-moon-fill"></i></div>

            <div class="text-center mb-4">
                <a href="index.html" class="navbar-brand m-0 fs-3 justify-content-center mb-3">
                    <img src="assets/images/favicon.png" alt="ArcVantage" class="brand-favicon me-2" style="height: 30px;">
                    ARC<span>VANTAGE</span>
                </a>
                <h2 class="mt-2 text-primary-brand">Client Registration</h2>
                <p class="text-muted small">Register for government project portal access</p>
            </div>

            <form action="login.html">
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label small fw-bold">First Name</label>
                        <input type="text" class="form-control" placeholder="John" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-bold">Last Name</label>
                        <input type="text" class="form-control" placeholder="Doe" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Department / Agency</label>
                    <input type="text" class="form-control" placeholder="State DOT / PWD" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Email Address</label>
                    <input type="email" class="form-control" placeholder="email@dept.gov" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Role</label>
                    <select class="form-select">
                        <option>Project Manager</option>
                        <option>Chief Engineer</option>
                        <option>Compliance Officer</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" class="form-control" placeholder="Create strong password" required>
                </div>
                
                <button type="submit" class="btn btn-brand-secondary w-100 py-2 text-center">Create Account</button>
            </form>

            <div class="auth-divider">Or register with</div>

            <div class="d-flex gap-3">
                <button class="social-login-btn">
                    <i class="bi bi-google text-danger"></i> Google
                </button>
                <button class="social-login-btn">
                    <i class="bi bi-linkedin text-primary"></i> LinkedIn
                </button>
            </div>

            <div class="text-center mt-4">
                <p class="small text-muted">Already have an account? <a href="login.html" class="text-secondary-brand fw-bold text-decoration-none">Login Here</a></p>
            </div>
        </div>
    </div>



    <!-- Back to Top -->
    <a href="#" class="back-to-top" id="backToTop"><i class="bi bi-arrow-up"></i></a>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
