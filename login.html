<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - STRUCENG Portal</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="home1.html">
                <i class="bi bi-bridge-fill text-secondary-brand"></i>
                STRUC<span>ENG</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="bi bi-list fs-1 text-white"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item"><a class="nav-link" href="home1.html">Home 1</a></li>
                    <li class="nav-item"><a class="nav-link" href="home2.html">Home 2</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3 ms-lg-3">
                    <div id="themeToggle" style="position: static;"><i class="bi bi-moon-fill"></i></div>
                </div>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card animate-fade-up">
            <div class="text-center mb-4">
                <a href="home1.html" class="navbar-brand fs-2 text-primary-brand justify-content-center">
                    <i class="bi bi-bridge-fill text-secondary-brand"></i>
                    STRUC<span>ENG</span>
                </a>
                <h2 class="mt-3">Client Login</h2>
                <p class="text-muted small">Access your secure engineering portal</p>
            </div>

            <form action="dashboard.html">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Goverment / Corporate Email</label>
                    <input type="email" class="form-control" placeholder="name@dept.gov" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Secure Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label small" for="remember">Remember me</label>
                    </div>
                    <a href="#" class="small text-primary-brand fw-bold text-decoration-none">Forgot?</a>
                </div>
                <button type="submit" class="btn btn-brand-primary w-100 py-2">Sign In to Hub</button>
            </form>

            <div class="auth-divider">Or continue with</div>

            <div class="d-flex gap-3">
                <button class="social-login-btn">
                    <i class="bi bi-google text-danger"></i> Google
                </button>
                <button class="social-login-btn">
                    <i class="bi bi-linkedin text-primary"></i> LinkedIn
                </button>
            </div>

            <div class="text-center mt-4">
                <p class="small text-muted">New department client? <a href="signup.html" class="text-secondary-brand fw-bold text-decoration-none">Register Hub</a></p>
                <a href="home1.html" class="btn btn-link btn-sm text-muted mt-2 text-decoration-none"><i class="bi bi-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>



    <!-- Scripts -->
    <script src="assets/js/main.js"></script>
</body>
</html>
