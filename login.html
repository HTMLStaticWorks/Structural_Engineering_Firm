<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ArcVantage Portal</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="auth-wrapper position-relative flex-column">
        <div class="hero-overlay hero-bg-main" style="opacity: 0.1;"></div>
        <div class="auth-card animate-fade-up position-relative z-1">
            <div class="position-absolute top-0 end-0 m-3 d-flex gap-3">
                <div id="rtlToggle" class="rtlToggle cursor-pointer fs-5 text-muted" title="Toggle RTL"><i class="bi bi-translate"></i></div>
                <div id="themeToggle" class="cursor-pointer fs-5 text-muted" title="Toggle Theme"><i class="bi bi-moon-fill"></i></div>
            </div>

            <div class="text-center mb-4">
                <a href="index.html" class="navbar-brand d-flex align-items-center justify-content-center m-0 mb-3" dir="ltr">
                    <img src="assets/images/favicon.png" alt="ArcVantage" class="brand-logo-img me-2">
                    ARC<span>VANTAGE</span>
                </a>
                <h2 class="mt-2 text-primary-brand">Client Login</h2>
                <p class="text-muted small">Access your secure engineering portal</p>
            </div>

            <form action="dashboard.html">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Goverment / Corporate Email</label>
                    <input type="email" class="form-control" placeholder="name@dept.gov" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Secure Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label small" for="remember">Remember me</label>
                    </div>
                    <a href="#" class="small text-primary-brand fw-bold text-decoration-none">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-brand-primary w-100 py-2">Sign In</button>
            </form>

            <div class="auth-divider">Or continue with</div>

            <div class="d-flex gap-3">
                <button class="social-login-btn">
                    <i class="bi bi-google text-danger"></i> Google
                </button>
                <button class="social-login-btn">
                    <i class="bi bi-linkedin text-primary"></i> LinkedIn
                </button>
            </div>

            <div class="text-center mt-4">
                <p class="small text-muted">New department client? <a href="signup.html" class="text-secondary-brand fw-bold text-decoration-none">Register Hub</a></p>
            </div>
        </div>
    </div>



    <!-- Back to Top -->
    <a href="#" class="back-to-top" id="backToTop"><i class="bi bi-arrow-up"></i></a>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
